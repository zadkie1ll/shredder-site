<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Shredder VPN" }}</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='/icons/icon-180.png') }}">
    <meta name="theme-color" content="#9cff1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Shredder">
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v={{ static_version() }}">
  </head>
  <body class="{{ body_class|default('') }}">
    <header class="topbar">
      <a class="brand" href="/">Shredder VPN</a>
      <nav class="nav">
        <a href="/#tariffs">Тарифы</a>
        {% if user %}
          <a href="/cabinet">Личный кабинет</a>
          <a href="/logout">Выйти</a>
        {% else %}
          <a href="/register">Регистрация</a>
          <a href="/login">Войти</a>
        {% endif %}
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
