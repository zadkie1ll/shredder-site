{% if yandex_oauth_enabled %}
<script src="https://yastatic.net/s3/passport-sdk/autofill/v1/sdk-suggest-with-polyfills-latest.js"></script>
<script>
  (function () {
    var container = document.getElementById("yandex-auth-container");
    if (!container || !window.YaAuthSuggest) {
      return;
    }

    function finishYandexLogin(data) {
      if (!data || !data.access_token) {
        throw new Error("missing_yandex_token");
      }

      var body = new URLSearchParams();
      body.set("access_token", data.access_token);
      return fetch("/auth/yandex/login", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString()
      })
        .then(function (response) {
          return response.json();
        })
        .then(function (result) {
          window.location.href = result.redirect || "/cabinet";
        });
    }

    window.YaAuthSuggest.init(
      {
        client_id: container.dataset.clientId,
        response_type: "token",
        redirect_uri: container.dataset.tokenUri
      },
      container.dataset.origin,
      {
        view: "button",
        parentId: "yandex-auth-container",
        buttonView: "main",
        buttonTheme: "dark",
        buttonSize: "l",
        buttonBorderRadius: 8
      }
    )
      .then(function (result) {
        var yandexButton = container.closest(".sh-social-button--yandex");
        if (!yandexButton || !result || result.status !== "ok" || typeof result.handler !== "function") {
          return;
        }
        yandexButton.addEventListener("click", function (event) {
          event.preventDefault();
          result.handler()
            .then(finishYandexLogin)
            .catch(function () {
              window.location.href = "/auth/yandex/start";
            });
        });
      })
      .catch(function () {});
  })();
</script>
{% endif %}
